    <!-- Metadata, OpenGraph and Schema.org -->
    {% include metadata.html %}

    <!-- Bootstrap & MDB -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@{{ site.bootstrap.version }}/dist/css/bootstrap.min.css" rel="stylesheet" integrity="{{ site.bootstrap.integrity.css }}" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdbootstrap@{{ site.mdb.version }}/css/mdb.min.css" integrity="{{ site.mdb.integrity.css }}" crossorigin="anonymous" />

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@{{ site.fontawesome.version }}/css/all.min.css" integrity="{{ site.fontawesome.integrity }}" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@{{ site.academicons.version }}/css/academicons.min.css" integrity="{{ site.academicons.integrity }}" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons">
    
    <!-- AritaBuriKR Font -->
    <style type="text/css">
      @font-face {
        font-family: 'LoraLocal';
        src: url('/assets/css/fonts/Lora-VariableFont_wght.ttf') format('truetype');
        font-weight: 100 900;
        font-style: normal;
      }
      @font-face {
        font-family: 'LoraLocal';
        src: url('/assets/css/fonts/Lora-Italic-VariableFont_wght.ttf') format('truetype');
        font-weight: 100 900;
        font-style: italic;
      }
      @font-face {
        font-family: 'AritaBuriKR';
        src: url('/assets/fonts/AritaBuriKR-Medium.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'AritaBuriKR';
        src: url('/assets/fonts/AritaBuriKR-Bold.ttf') format('truetype');
        font-weight: bold;
        font-style: normal;
      }
      @font-face {
        font-family: 'AritaBuriKR';
        src: url('/assets/fonts/AritaBuriKR-Light.ttf') format('truetype');
        font-weight: 300;
        font-style: normal;
      }
      body {
        font-family: 'LoraLocal', 'AritaBuriKR', serif;
      }
    </style>

    <!-- Code Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jwarby/jekyll-pygments-themes@master/{{ site.highlight_theme_light | append: '.css' }}" media="none" id="highlight_theme_light" />

    <!-- Styles -->
    {% if site.icon.size < 3 %}
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>{{ site.icon }}</text></svg>">
    {% elsif site.icon != blank %}
    <link rel="shortcut icon" href="{{ site.icon | prepend: '/assets/img/' | relative_url}}"/>
    {% endif %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    
    <!-- Dark Mode -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jwarby/jekyll-pygments-themes@master/{{ site.highlight_theme_dark | append: '.css' }}" media="none" id="highlight_theme_dark" />

    <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/dark_mode.js' | relative_url }}"></script>

    <!-- Social Badges Header Styles -->
    <style>
    .social-badges-header {
        display: flex;
        align-items: center;
        gap: 5px;
        height: 100%;
        line-height: normal;
    }
    
    .nav-item .social-badges-header {
        display: flex;
        align-items: center;
        height: 100%;
    }
    
    .nav-item.social-nav-item {
        margin-right: auto;
        order: -1;
    }
    
    .social-badges-header a {
        text-decoration: none;
        transition: transform 0.2s ease;
    }
    
    .social-badges-header a:hover {
        transform: translateY(-1px);
    }
    
    @media (max-width: 768px) {
        .social-badges-header {
            gap: 3px;
        }
        
        .social-badges-header img {
            height: 20px !important;
        }
    }
    </style>
