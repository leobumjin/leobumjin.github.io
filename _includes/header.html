<header class="site-header-shell">
  <nav id="navbar" class="navbar navbar-light navbar-expand-sm {% if site.navbar_fixed %}fixed-top{% else %}sticky-top{% endif %}">
    <div class="container nav-shell">
      <a class="navbar-brand title font-weight-lighter nav-brand" href="{{ '/' | relative_url }}">
        <span class="nav-brand-copy">
          <span class="nav-brand-name">Leo Bumjin Park</span>
        </span>
      </a>

      <div class="nav-menu-shell" id="navMenuShell">
        <button id="nav-menu-toggle" class="nav-menu-toggle" type="button" aria-expanded="false" aria-controls="navMenuPanel" aria-label="Open menu">
          <span class="nav-menu-toggle-glyph">∞</span>
        </button>

        <div class="nav-menu-panel" id="navMenuPanel">
          <ul class="navbar-nav ml-auto nav-links">
          <li class="nav-item {% if page.url contains '/work/' %}active{% endif %}">
            <a class="nav-link" href="{{ '/work/' | relative_url }}">Work</a>
          </li>
          <li class="nav-item {% if page.url contains '/essay/' %}active{% endif %}">
            <a class="nav-link" href="{{ '/essay/' | relative_url }}">Posts</a>
          </li>
          </ul>
        </div>

        <div class="nav-tools">
          <button id="light-toggle" class="theme-switch" type="button" aria-label="Toggle theme">
            <span class="theme-switch-track">
              <span class="theme-switch-thumb"></span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
